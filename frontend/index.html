<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSMIK - Arxivlash</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Animated Background -->
        <div class="bg-animation">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h1 class="main-title">KOSMIK</h1>
                <p class="department-name">MALUMOTLARNI QABUL QILISH, UMUMLASHTIRISH VA SAQLASH DEPARTAMENTI</p>
            </header>

            <!-- Main Form -->
            <div class="main-form">
                <!-- Input/Output Row -->
                <div class="io-row">
                    <div class="input-group">
                        <label for="inputPath">Вход</label>
                        <div class="input-wrapper manual">
                            <input type="text" id="inputPath" placeholder="Введите путь к папке год/...">
                        </div>
                        <div class="validation-status" id="inputValidation"></div>
                    </div>

                    <div class="input-group">
                        <label for="outputPath">Выход</label>
                        <div class="input-wrapper manual">
                            <input type="text" id="outputPath" placeholder="Введите путь для сохранения архива">
                        </div>
                    </div>
                </div>

                <!-- Format Selector -->
                <div class="format-section">
                    <label class="format-label">Формат</label>
                    <div class="format-grid" id="formatGrid">
                        <!-- populated by JS -->
                    </div>
                </div>

                <!-- Archive Button -->
                <button class="archive-btn" id="archiveBtn" onclick="createArchive()" disabled>
                    <span class="btn-content">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>
                        </svg>
                        Создать архив
                    </span>
                    <span class="btn-loading">
                        <div class="spinner"></div>
                        Обработка...
                    </span>
                </button>

                <!-- Progress Section -->
                <div class="progress-section" id="progressSection">
                    <div class="progress-header">
                        <span class="progress-status" id="progressStatus">Подготовка...</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-stats">
                        <div class="progress-stat">
                            <span class="stat-label">Прогресс</span>
                            <span class="stat-value" id="progressBytes">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Скорость</span>
                            <span class="stat-value" id="progressSpeed">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Прошло</span>
                            <span class="stat-value" id="progressElapsed">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Осталось</span>
                            <span class="stat-value" id="progressEta">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Вилоятов</span>
                            <span class="stat-value" id="progressViloyats">—</span>
                        </div>
                    </div>
                </div>

                <!-- Result Section -->
                <div class="result-section" id="resultSection">
                    <div class="result-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <h3>Архив успешно создан!</h3>
                    </div>
                    <div class="result-details">
                        <div class="result-item">
                            <span class="label">Вилоятов</span>
                            <span class="value" id="resultViloyat">-</span>
                        </div>
                    </div>
                    <div class="result-path">
                        <span class="label">Сохранено:</span>
                        <code id="resultPath">-</code>
                    </div>
                </div>
            </div>

                    </main>

        <!-- File Browser Modal -->
        <div class="modal" id="browserModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Выберите папку</h2>
                    <button class="close-btn" onclick="closeBrowser()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-path">
                    <button class="back-btn" id="backBtn" onclick="goBack()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                        </svg>
                    </button>
                    <input type="text" id="currentPath" readonly>
                </div>
                <div class="folder-list" id="folderList"></div>
                <div class="modal-footer">
                    <button class="cancel-btn" onclick="closeBrowser()">Отмена</button>
                    <button class="select-btn" onclick="selectFolder()">Выбрать</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
