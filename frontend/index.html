<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSMIK - Arxivlash</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="bg-animation">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>

        <main class="main-content">
            <!-- Sarlavha -->
            <header class="header">
                <h1 class="main-title shiny-text">KOSMIK</h1>
                <p class="department-name shiny-text">MALUMOTLARNI QABUL QILISH, UMUMLASHTIRISH VA SAQLASH DEPARTAMENTI</p>
            </header>

            <div class="main-form">
                <!-- KIRISH (input) papkasi - katta va ko'rinib turadigan -->
                <div class="path-block">
                    <label class="path-label" for="inputPath">
                        <span class="path-icon">📂</span>
                        <span class="path-text">KIRISH PAPKASI</span>
                        <span class="path-hint">Viloyatlar joylashgan papka (Viloyat/Unprocessed/2A)</span>
                    </label>
                    <input type="text" id="inputPath" class="path-input"
                           placeholder="D:\2A-Unprocessed\Data" autocomplete="off">
                    <div class="validation-status" id="inputValidation"></div>
                </div>

                <!-- CHIQISH (output) papkasi - katta va ko'rinib turadigan -->
                <div class="path-block">
                    <label class="path-label" for="outputPath">
                        <span class="path-icon">💾</span>
                        <span class="path-text">CHIQISH PAPKASI</span>
                        <span class="path-hint">Arxivlar saqlanadigan papka</span>
                    </label>
                    <input type="text" id="outputPath" class="path-input"
                           placeholder="D:\2A-Unprocessed\Archives" autocomplete="off">
                </div>

                <!-- Asosiy tugma -->
                <button class="archive-btn" id="archiveBtn" onclick="createArchive()" disabled>
                    <span class="btn-content">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>
                        </svg>
                        ARXIVLASHNI BOSHLASH
                    </span>
                    <span class="btn-loading">
                        <div class="spinner"></div>
                        Arxivlanmoqda...
                    </span>
                </button>

                <!-- Progress -->
                <div class="progress-section" id="progressSection">
                    <div class="progress-header">
                        <span class="progress-status" id="progressStatus">Tayyorlanmoqda...</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-stats">
                        <div class="progress-stat">
                            <span class="stat-label">Bajarildi</span>
                            <span class="stat-value" id="progressBytes">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Tezlik</span>
                            <span class="stat-value" id="progressSpeed">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">O'tgan vaqt</span>
                            <span class="stat-value" id="progressElapsed">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Qolgan vaqt</span>
                            <span class="stat-value" id="progressEta">—</span>
                        </div>
                        <div class="progress-stat">
                            <span class="stat-label">Viloyatlar</span>
                            <span class="stat-value" id="progressViloyats">—</span>
                        </div>
                    </div>
                </div>

                <!-- Natija -->
                <div class="result-section" id="resultSection">
                    <div class="result-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <h3>Arxiv muvaffaqiyatli yaratildi!</h3>
                    </div>
                    <div class="result-details">
                        <div class="result-item">
                            <span class="label">Viloyatlar</span>
                            <span class="value" id="resultViloyat">-</span>
                        </div>
                    </div>
                    <div class="result-path">
                        <span class="label">Saqlandi:</span>
                        <code id="resultPath">-</code>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
